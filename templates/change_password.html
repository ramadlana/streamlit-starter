{% extends "base.html" %}

{% block title %}Change Password{% endblock %}

{% block content %}
<div class="card">
    <h1>Change password</h1>
    <p class="subtitle">Enter your current password and choose a new one.</p>

    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label for="current_password">Current password</label>
            <input type="password" id="current_password" name="current_password" placeholder="••••••••" required>
        </div>
        <div class="form-group">
            <label for="new_password">New password</label>
            <input type="password" id="new_password" name="new_password" placeholder="••••••••" required minlength="8">
        </div>
        <div class="form-group">
            <label for="confirm_password">Confirm new password</label>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required minlength="8">
        </div>
        <button type="submit" class="btn">Update password</button>
    </form>

    <div class="auth-footer">
        <a href="{{ url_for('home.index') }}">Back to home</a>
    </div>
</div>
{% endblock %}
